apiVersion: coherence.oracle.com/v1
kind: Coherence
metadata:
  name: todo-list
spec:
  cluster: ToDo-Helidon
  replicas: 1
  image: ghcr.io/coherence-community/todo-list-helidon-server:24.09
  env:
    - name: OTEL_TRACES_EXPORTER
      value: "otlp"
    - name: OTEL_TRACES_SAMPLER
      value: "always_on"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://jaeger-collector:4317"
  application:
    type: helidon
  coherence:
    metrics:
      enabled: true
#    persistence:
#      mode: active
#      persistentVolumeClaim:
#        storageClassName: "oci-bv"
#        accessModes:
#          - ReadWriteOnce
#        resources:
#          requests:
#            storage: 50Gi
  jvm:
    memory:
      heapSize: 1g
  ports:
    - name: grpc
      port: 1408
    - name: http
      port: 7001
      serviceMonitor:
        enabled: true
    - name: metrics
      serviceMonitor:
        enabled: true
