name: CI Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 14.x
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'zulu'
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.24
        cache-dependency-path: go/go.sum
    - name: Install Oracle JET
      run: npm install -g @oracle/ojet-cli
    - name: Build Oracle JET front end
      run: |
        pushd java/helidon-server/src/main/web/jet
        npm install
        ojet build
        popd
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Build
      env:
        MAVEN_OPTS: -Dmaven.wagon.http.retryHandler.count=3
      run: mvn -B install --file java/pom.xml -s java/.mvn/settings.xml -P docker
    - name: Validate Micronaut Fat Jar
      run: |
        bin/test-fat-jar.sh -d $(ls java/micronaut-server/target/*shaded.jar)
    - name: Validate Spring Fat Jar
      run: |
        bin/test-fat-jar.sh -d $(ls java/spring-server/target/*.jar)
    - name: Run Helidon Server
      run: |
        log="$RUNNER_TEMP/helidon-server.log"
        pushd java/helidon-server
        mvn exec:exec -s ../.mvn/settings.xml > "$log" 2>&1 &
        helidon_pid=$!
        popd
        for i in {1..60}; do
          if ! kill -0 "$helidon_pid" 2>/dev/null; then
            cat "$log"
            exit 1
          fi
          if nc -z 127.0.0.1 1408 >/dev/null 2>&1; then
            exit 0
          fi
          sleep 1
        done
        cat "$log"
        exit 1
    - name : Run Node.js Server
      run: |
        pushd js
        npm install
        npm run start &
        popd
    - name: Run JavaFX Coherence Client
      run: |
        pushd java/coherence-client
        mvn javafx:run -s ../.mvn/settings.xml &
        popd
    - name: Run JavaFX Helidon Client
      run: |
        pushd java/helidon-client
        mvn javafx:run -s ../.mvn/settings.xml &
        popd
    - name: Run Go Client
      env:
        COHERENCE_SERVER_ADDRESS: 127.0.0.1:1408
      run: |
        pushd go
        go mod tidy
        go test -v .
        popd
